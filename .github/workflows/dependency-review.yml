name: Dependency review

# Flags vulnerable or disallowed dependencies introduced by a pull request,
# before they reach main. Supply-chain guardrail.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # Reject copyleft / unknown licences in a payments library's deps.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-3.0
