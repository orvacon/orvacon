name: Feature request
description: Propose a new capability or change
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Keep everything in English. Before opening, check the scope: orvacon is a
        payment orchestration library — it never holds money, and it is not an
        e-commerce platform or an Iyzico wrapper.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What does the library make hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the API or behavior look like?
      render: ts
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you rejected them.
    validations:
      required: false
